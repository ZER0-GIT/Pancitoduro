<!doctype html>
<html lans="es">

<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="resources/style/registrar.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="registro-body">
  <header>
    <img src="resources/image/logo.png" alt="logo">
    <h1>Pancitoduro</h1>
    <p class="linetag">Horneado con corazón, rescatado con propósito</p>
  </header>
  <div class="form-container">
    <h3>Crea tu cuenta</h3>
    <p>Únete a nuestra comunidad y rescata el sabor artesanal</p>
    <form action="login.html" method="post">

      <label for="UsuarioR">Nombre Completo</label>
      <div class="input-group">
        <i class="fa-solid fa-user icon"></i>
        <input type="text" id="UsuarioR" name="UsuarioR" placeholder="Nombre Completo" required />
      </div>

      <label for="email">Correo Electrónico</label>
      <div class="input-group">
        <i class="fa-solid fa-envelope icon"></i>
        <input type="email" id="email" name="email" placeholder="name@gmail.com" required />
      </div>

      <label for="Contraseña">Contraseña</label>
      <div class="input-group">
        <i class="fa-solid fa-lock icon"></i>
        <input type="password" id="Contraseña" name="Contraseña" required />
      </div>

      <label for="ContraseñaR">Confirma contraseña</label>
      <input type="password" id="ConfirmarR" name="ContraseñaR" required /> 

      <input type="checkbox" id="terminos" name="terminos" required />
      <label for="terminos">Acepto los términos y la política de privacidad</label> 

      <button type="submit">Registrar</button> 

      <p>¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a></p>
    </form>
  </div>
</body>

</html>
