<!doctype html>
<html lans="es">

<head>
  <meta charset="UTF-8" />
  <title>Inico</title>
  <link rel="stylesheet" href="resources/style/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="login-body">
  <header>
    <img src="resources/image/logo.png" alt="logo">
    <h1>Pancitoduro</h1>
    <p class="linetag">Horneado con corazón, rescatado con propósito</p>
  </header>
  <div class="form-container">
    <h3>Bienvenido de Vuelta</h3>
    <p>Ingresa a tu cuenta de artesano</p>

    <form action="index.html" method="post">
      <label for="Usuario">Usuario</label>
      <div class="input-group">
        <i class="fa-solid fa-user icon"></i>
        <input type="text" id="Usuario" name="Usuario" placeholder="Nombre de Usuario" required />
      </div>

      <label for="Contraseña">Contraseña</label>
      <div class="input-group">
        <i class="fa-solid fa-lock icon"></i>
        <input type="password" id="Contraseña" name="Contraseña" required />
      </div>
      
      <input type="checkbox" id="mensaje" name="mensaje" />
      <label> Recordarme en este dispositivo</label> 

      <button type="submit">Ingresar</button> 

      <a href="registrar.html">Nuevo Usuario</a> 
    </form>
  </div>
</body>

</html>
