<!doctype html>
<html lans="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito</title>
</head>

<body>
    <header style="text-align: center">
        <h1>Formulario de Pedido</h1>
        <nav>
            <a href="index.html">Inicio</a> |
            <a href="menu.html">Regresar al Menú</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Detalles de tu entrega</h2>
            
            <form action="pedidos.html" method="post">
                
                <label for="nombre">Nombre del cliente:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required><br><br>

                <label for="direccion">Dirección de entrega:</label>
                <input type="text" id="direccion" name="direccion" placeholder="Calle, número y distrito" required><br><br>

                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej: 987654321" required><br><br>

                <label>Selección de platos:</label><br>
                
                <input type="checkbox" id="plato1" name="platos" value="Menu del dia">
                <label for="plato1">Menú del día (Rescate)</label><br>
                
                <input type="checkbox" id="plato2" name="platos" value="Pack sorpresa">
                <label for="plato2">Pack Sorpresa Vegetariano</label><br>
                
                <input type="checkbox" id="plato3" name="platos" value="Postres">
                <label for="plato3">Dúo de postres del día</label><br><br>

                <label for="cantidad">Cantidad:</label><br>
                <input type="number" id="cantidad" name="cantidad" min="1" max="10" value="1" required><br><br>

                
                <button type="submit">Enviar Pedido</button>
                <button type="reset">Limpiar formulario</button>

            </form>
        </section>
    </main>
</body>

</html>
